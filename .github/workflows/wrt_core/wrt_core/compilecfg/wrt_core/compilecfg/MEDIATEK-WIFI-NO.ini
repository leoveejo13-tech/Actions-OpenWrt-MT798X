#设备平台
CONFIG_TARGET_mediatek=y
CONFIG_TARGET_mediatek_filogic=y
CONFIG_TARGET_MULTI_PROFILE=y
#设备列表
CONFIG_TARGET_DEVICE_mediatek_filogic_DEVICE_supergateway_s20l=y
CONFIG_TARGET_DEVICE_mediatek_filogic_DEVICE_supergateway_s20m=y
CONFIG_TARGET_DEVICE_mediatek_filogic_DEVICE_supergateway_s20p=y
CONFIG_TARGET_DEVICE_mediatek_filogic_DEVICE_zyxel_ex5700-telenor=y
CONFIG_TARGET_ALL_PROFILES=n

#WIFI驱动 - 移除所有无线驱动
CONFIG_TARGET_DEVICE_PACKAGES_mediatek_filogic_DEVICE_supergateway_s20l="-kmod-mt76 -kmod-mt76-connac -kmod-mt76-core -kmod-mt7915e -kmod-mt7915-firmware -kmod-mt7916-firmware -kmod-mt7986-firmware -mt7986-wo-firmware"
CONFIG_TARGET_DEVICE_PACKAGES_mediatek_filogic_DEVICE_supergateway_s20m="-kmod-mt76 -kmod-mt76-connac -kmod-mt76-core -kmod-mt7915e -kmod-mt7915-firmware -kmod-mt7916-firmware -kmod-mt7986-firmware -mt7986-wo-firmware"
CONFIG_TARGET_DEVICE_PACKAGES_mediatek_filogic_DEVICE_supergateway_s20p="-kmod-mt76 -kmod-mt76-connac -kmod-mt76-core -kmod-mt7915e -kmod-mt7915-firmware -kmod-mt7916-firmware -kmod-mt7986-firmware -mt7986-wo-firmware"
CONFIG_TARGET_DEVICE_PACKAGES_mediatek_filogic_DEVICE_zyxel_ex5700-telenor="-kmod-mt76 -kmod-mt76-connac -kmod-mt76-core -kmod-mt7915e -kmod-mt7915-firmware -kmod-mt7916-firmware -kmod-mt7986-firmware -mt7986-wo-firmware"

# 移除无线相关包和界面
CONFIG_PACKAGE_hostapd-common=n
CONFIG_PACKAGE_wpad-basic-mbedtls=n
CONFIG_PACKAGE_wpad-basic-openssl=n
CONFIG_PACKAGE_wpad-mbedtls=n
CONFIG_PACKAGE_wpad-openssl=n
CONFIG_PACKAGE_iw=n
CONFIG_PACKAGE_iwinfo=n

# 明确禁用所有 mt76 相关内核模块
CONFIG_PACKAGE_kmod-mt76=n
CONFIG_PACKAGE_kmod-mt76-connac=n
CONFIG_PACKAGE_kmod-mt76-core=n
CONFIG_PACKAGE_kmod-mt7915e=n
CONFIG_PACKAGE_kmod-mt7915-firmware=n
CONFIG_PACKAGE_kmod-mt7916-firmware=n
CONFIG_PACKAGE_kmod-mt7986-firmware=n
CONFIG_PACKAGE_mt7986-wo-firmware=n
CONFIG_PACKAGE_kmod-mt7603=n
CONFIG_PACKAGE_kmod-mt7615e=n
CONFIG_PACKAGE_kmod-mt7615-firmware=n
CONFIG_PACKAGE_kmod-mt7622-firmware=n
CONFIG_PACKAGE_kmod-mt7663-firmware-ap=n
CONFIG_PACKAGE_kmod-mt7663-firmware-sta=n
CONFIG_PACKAGE_kmod-mt7663s=n
CONFIG_PACKAGE_kmod-mt7663u=n
CONFIG_PACKAGE_kmod-mt76x0e=n
CONFIG_PACKAGE_kmod-mt76x0u=n
CONFIG_PACKAGE_kmod-mt76x2=n
CONFIG_PACKAGE_kmod-mt76x2u=n
CONFIG_PACKAGE_kmod-mt7601u=n
CONFIG_PACKAGE_mt7601u-firmware=n
CONFIG_PACKAGE_mt7622bt-firmware=n

# ========================================
# iStore 核心依赖（必须先安装）
# ========================================
CONFIG_PACKAGE_curl=y
CONFIG_PACKAGE_opkg=y
CONFIG_PACKAGE_luci-lib-ipkg=y
CONFIG_PACKAGE_libuci-lua=y
CONFIG_PACKAGE_mount-utils=y
CONFIG_PACKAGE_taskd=y
CONFIG_PACKAGE_luci-lib-taskd=y
CONFIG_PACKAGE_luci-lib-xterm=y

# tar 及其完整依赖链（iStore 关键依赖）
CONFIG_PACKAGE_tar=y
CONFIG_PACKAGE_bzip2=y
CONFIG_PACKAGE_libbz2=y
CONFIG_PACKAGE_xz=y
CONFIG_PACKAGE_xz-utils=y
CONFIG_PACKAGE_liblzma=y
CONFIG_PACKAGE_libzstd=y
CONFIG_PACKAGE_libacl=y
CONFIG_PACKAGE_libattr=y
CONFIG_PACKAGE_TAR_BZIP2=y
CONFIG_PACKAGE_TAR_GZIP=y
CONFIG_PACKAGE_TAR_XZ=y
CONFIG_PACKAGE_TAR_ZSTD=y
CONFIG_PACKAGE_TAR_POSIX_ACL=y
CONFIG_PACKAGE_TAR_XATTR=y

# iStore 应用商店
CONFIG_PACKAGE_luci-app-store=y
CONFIG_PACKAGE_luci-i18n-store-zh-cn=y

# iStore 快速启动（首页）
CONFIG_PACKAGE_quickstart=y
CONFIG_PACKAGE_luci-app-quickstart=y
CONFIG_PACKAGE_luci-i18n-quickstart-zh-cn=y

# iStore 增强
CONFIG_PACKAGE_istoreenhance=y
CONFIG_PACKAGE_luci-app-istoreenhance=y
CONFIG_PACKAGE_luci-i18n-istoreenhance-zh-cn=y

# iStore 其他应用
CONFIG_PACKAGE_luci-app-ddnsto=y
CONFIG_PACKAGE_luci-app-fastnet=y
CONFIG_PACKAGE_luci-app-floatip=y

# Kernel modules
CONFIG_PACKAGE_kmod-tls=y
CONFIG_PACKAGE_kmod-tun=y

# Package
CONFIG_PACKAGE_htop=y
CONFIG_PACKAGE_fuse-utils=y
CONFIG_PACKAGE_openssh-sftp-server=y
CONFIG_PACKAGE_tcpdump=y
CONFIG_PACKAGE_sgdisk=y
CONFIG_PACKAGE_openssl-util=y
CONFIG_PACKAGE_qrencode=y

# Enable Luci App
CONFIG_PACKAGE_luci-app-adguardhome=n
CONFIG_PACKAGE_luci-app-adguardhome_INCLUDE_binary=n
CONFIG_PACKAGE_luci-app-autoreboot=y
CONFIG_PACKAGE_luci-app-dockerman=y
CONFIG_PACKAGE_luci-app-samba4=y
CONFIG_PACKAGE_luci-app-vlmcsd=y
